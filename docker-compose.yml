services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_DATABASE:-guised_up}
      POSTGRES_USER: ${DB_USERNAME:-guised_up}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-guised_up}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-guised_up} -d ${DB_DATABASE:-guised_up}"]
      interval: 5s
      timeout: 5s
      retries: 20

  embedding:
    build:
      context: ./embedding
    environment:
      EMBEDDING_MODEL_NAME: ${FEED_EMBEDDING_MODEL:-hash-embedding-v1}
      EMBEDDING_DIMENSIONS: ${FEED_EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_SERVICE_TOKEN: ${FEED_EMBEDDING_SERVICE_TOKEN:-local-embedding-service-token}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_ENDPOINT: ${OPENAI_EMBEDDING_ENDPOINT:-https://api.openai.com/v1/embeddings}
      OPENAI_EMBEDDING_TIMEOUT_SECONDS: ${OPENAI_EMBEDDING_TIMEOUT_SECONDS:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_ENDPOINT: ${GEMINI_EMBEDDING_ENDPOINT:-https://generativelanguage.googleapis.com/v1beta/models/{model}:batchEmbedContents}
      GEMINI_EMBEDDING_TASK_TYPE: ${GEMINI_EMBEDDING_TASK_TYPE:-RETRIEVAL_DOCUMENT}
      GEMINI_EMBEDDING_TIMEOUT_SECONDS: ${GEMINI_EMBEDDING_TIMEOUT_SECONDS:-10}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      COHERE_EMBEDDING_MODEL: ${COHERE_EMBEDDING_MODEL:-embed-english-light-v3.0}
      COHERE_EMBEDDING_ENDPOINT: ${COHERE_EMBEDDING_ENDPOINT:-https://api.cohere.com/v2/embed}
      COHERE_EMBEDDING_INPUT_TYPE: ${COHERE_EMBEDDING_INPUT_TYPE:-search_document}
      COHERE_EMBEDDING_TRUNCATE: ${COHERE_EMBEDDING_TRUNCATE:-END}
      COHERE_EMBEDDING_TIMEOUT_SECONDS: ${COHERE_EMBEDDING_TIMEOUT_SECONDS:-10}
    ports:
      - "127.0.0.1:${EMBEDDING_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      FEED_EMBEDDING_SERVICE_URL: http://embedding:8080
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      embedding:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - api-vendor:/var/www/html/vendor

volumes:
  postgres-data:
  api-vendor:
